<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exclusive - checkout</title>
    <meta name="description" content="checkout exclusive">
    <meta name="keywords" content="E-Commerce,products,exclusive,checkout">
    <meta name="author" content="react group 2">
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
    <!-- google fonts Inter & Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- fontawesome -->
    <link href="./assets/css/all.min.css" rel="stylesheet">
    <!-- tailwind -->
    <link href="./assets/css/output.css" rel="stylesheet">
</head>

<body>

    <!-- start Breadcrumb -->
    <nav id="breadCrumb" aria-label="Breadcrumb" class="my-8">
        <ol
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400">
            <li>
                <a href="./index.html" class="hover:text-primary transition-colors">Home</a>
            </li>
            <i class="fa-solid fa-chevron-right text-xs"></i>
            <li>
                <a href="/cart.html" class="hover:text-primary transition-colors">Cart</a>
            </li>
            <i class="fa-solid fa-chevron-right text-xs"></i>
            <li class="text-primary font-medium" aria-current="page">
                Checkout
            </li>
        </ol>
    </nav>
    <!-- end Breadcrumb -->


    <!-- Page Title + Layout -->
    <section id="checkout" aria-labelledby="billing-heading" class="pb-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
                <!-- Billing Form -->
                <div class="lg:col-span-5" aria-labelledby="billing-heading">
                    <h2 id="billing-heading" class="text-2xl font-medium mb-8">Billing Details</h2>

                    <form id="billingForm" class="space-y-6">
                        <div class="space-y-2">
                            <label for="firstName" class="block text-sm text-gray-500">
                                First Name
                                <span class="text-red-500">*</span>
                            </label>
                            <input id="firstName" name="firstName" type="text" required
                                class="w-full rounded-md bg-gray-100 px-4 py-3 text-gray-900 placeholder:text-gray-400" />
                        </div>

                        <div class="space-y-2">
                            <label for="company" class="block text-sm text-gray-500">Company Name</label>
                            <input id="company" name="company" type="text"
                                class="w-full rounded-md bg-gray-100 px-4 py-3 text-gray-900 placeholder:text-gray-400" />
                        </div>

                        <div class="space-y-2">
                            <label for="street" class="block text-sm text-gray-500">
                                Street Address
                                <span class="text-red-500">*</span>
                            </label>
                            <input id="street" name="street" type="text" required
                                class="w-full rounded-md bg-gray-100 px-4 py-3 text-gray-900 placeholder:text-gray-400" />
                        </div>

                        <div class="space-y-2">
                            <label for="apartment" class="block text-sm text-gray-500">Apartment, floor, etc.
                                (optional)</label>
                            <input id="apartment" name="apartment" type="text"
                                class="w-full rounded-md bg-gray-100 px-4 py-3 text-gray-900 placeholder:text-gray-400" />
                        </div>

                        <div class="space-y-2">
                            <label for="city" class="block text-sm text-gray-500">
                                Town/City
                                <span class="text-red-500">*</span>
                            </label>
                            <input id="city" name="city" type="text" required
                                class="w-full rounded-md bg-gray-100 px-4 py-3 text-gray-900 placeholder:text-gray-400" />
                        </div>

                        <div class="space-y-2">
                            <label for="phone" class="block text-sm text-gray-500">
                                Phone Number
                                <span class="text-red-500">*</span>
                            </label>
                            <input id="phone" name="phone" type="tel" required
                                class="w-full rounded-md bg-gray-100 px-4 py-3 text-gray-900 placeholder:text-gray-400" />
                        </div>

                        <div class="space-y-2">
                            <label for="email" class="block text-sm text-gray-500">
                                Email Address
                                <span class="text-red-500">*</span>
                            </label>
                            <input id="email" name="email" type="email" required
                                class="w-full rounded-md bg-gray-100 px-4 py-3 text-gray-900 placeholder:text-gray-400" />
                        </div>

                        <div class="flex items-center gap-3">
                            <input type="checkbox" id="save" name="save" class="h-5 w-5 accent-primary" />
                            <label for="save" class="text-sm text-gray-700">Save this information for faster check-out
                                next
                                time</label>
                        </div>
                    </form>
                </div>

                <!-- Order Summary -->
                <aside class="lg:col-span-5 lg:col-start-8 flex flex-col gap-8">
                    <ul class="space-y-6 divide-y divide-gray-200">
                        <li class="flex items-center justify-between gap-4 py-4 first:pt-0">
                            <div class="flex items-center gap-4">
                                <div class="size-14 rounded flex items-center justify-center">
                                    <img src="./assets/images/product-10.png" alt="CANON EOS DSLR Camera"
                                        class="h-10 w-auto" />
                                </div>
                                <span class="font-medium">CANON EOS DSLR Camera</span>
                            </div>
                            <span class="font-medium">$650</span>
                        </li>

                        <li class="flex items-center justify-between gap-4 py-4">
                            <div class="flex items-center gap-4">
                                <div class="size-14 shrink-0 rounded flex items-center justify-center">
                                    <img src="./assets/images/product-11.png" alt="ASUS FHD Gaming Laptop"
                                        class="h-10 w-auto" />
                                </div>
                                <span class="font-medium">ASUS FHD Gaming Laptop</span>
                            </div>
                            <span class="font-medium">$1100</span>
                        </li>
                    </ul>

                    <section class="border-t border-gray-200 pt-6 space-y-4" aria-label="Order totals">
                        <div class="flex justify-between text-gray-700">
                            <span>Subtotal:</span>
                            <span>$1750</span>
                        </div>
                        <div class="flex justify-between text-gray-700">
                            <span>Shipping:</span>
                            <span>Free</span>
                        </div>
                        <div class="flex justify-between border-t border-gray-200 pt-4 text-lg font-bold">
                            <span>Total:</span>
                            <span>$1750</span>
                        </div>
                    </section>

                    <!-- Payment Methods -->
                    <fieldset class="space-y-5">
                        <legend class="text-lg font-medium">Payment Method</legend>

                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <input type="radio" name="payment" id="bank" class="h-5 w-5 accent-black" />
                                <label for="bank" class="font-medium">Bank</label>
                            </div>
                            <div class="flex gap-2">
                                <img src="https://img.icons8.com/color/48/visa.png" class="h-8 w-auto" alt="Visa" />
                                <img src="https://img.icons8.com/color/48/mastercard.png" class="h-8 w-auto"
                                    alt="Mastercard" />
                            </div>
                        </div>

                        <div class="flex items-center gap-3">
                            <input type="radio" name="payment" id="cod" checked class="h-5 w-5 accent-black" />
                            <label for="cod" class="font-medium">Cash on delivery</label>
                        </div>
                    </fieldset>

                    <!-- Coupon -->
                    <div class="flex gap-4 h-14">
                        <input type="text" id="couponCode" placeholder="Coupon Code"
                            class="flex-1 rounded-md bg-gray-100 px-5 text-sm placeholder:text-gray-400" />
                        <button type="button" onclick="applyCoupon()"
                            class="bg-red-600 px-8 text-white font-medium rounded-md hover:bg-red-700">
                            Apply Coupon
                        </button>
                    </div>

                    <!-- Place Order -->
                    <button type="button" onclick="handlePlaceOrder()"
                        class="bg-red-600 text-white py-4 px-12 rounded-md font-medium hover:bg-red-700 w-fit">
                        Place Order
                    </button>
                </aside>
            </div>
        </div>
    </section>



    <!-- JS -->
    <script src="./assets/js/index.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exclusive - userAccount</title>
    <meta name="description" content="A full-stack E-Commerce web application inspired by a modern Figma design">
    <meta name="keywords" content="E-Commerce,products,exclusive">
    <meta name="author" content="react group 2">
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
    <!-- google fonts Inter & Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- fontawesome -->
    <link href="./assets/css/all.min.css" rel="stylesheet">
    <!-- tailwind -->
    <link href="./assets/css/output.css" rel="stylesheet">
</head>

<body>


    <!-- start Breadcrumb -->
    <nav id="breadCrumb" aria-label="Breadcrumb" class="my-8">
        <ol
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400">
            <li>
                <a href="./index.html" class="hover:text-primary transition-colors">Home</a>
            </li>
            <i class="fa-solid fa-chevron-right text-xs"></i>
            <li class="text-primary font-medium" aria-current="page">
                My Account
            </li>
        </ol>
    </nav>
    <!-- end Breadcrumb -->

    <!-- start userAccount -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Sidebar -->
            <aside class="lg:col-span-1">
                <div
                    class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                    <div class="p-4 bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-600">
                        <h3 class="font-semibold text-lg">Manage My Account</h3>
                    </div>
                    <ul
                        class="[&_li]:px-4 [&_li]:py-3 [&_li]:cursor-pointer [&_li]:transition-colors [&_li]:border-b [&_li]:border-gray-100 dark:[&_li]:border-gray-700 last:[&_li]:border-0">
                        <li class="bg-primary/10 hover:bg-primary/10">
                            <a href=" ./user-account.html"
                                class="group-hover:text-primary flex items-center gap-3 text-primary font-medium">
                                <i class="fa-regular fa-user"></i>
                                <span>My Profile</span>
                            </a>
                        </li>
                        <li class="group">
                            <a href="./orders.html"
                                class="group-hover:text-primary flex items-center gap-3 text-gray-600 dark:text-gray-400">
                                <i class="fa-solid fa-box-open"></i>
                                <span>My Orders</span>
                            </a>
                        </li>
                        <li class="group">
                            <a href="./reviews.html"
                                class="group-hover:text-primary flex items-center gap-3 text-gray-600 dark:text-gray-400">
                                <i class="fa-regular fa-star"></i>
                                <span>My Reviews</span>
                            </a>
                        </li>
                        <li class="group">
                            <a href="./payment-methods.html"
                                class="group-hover:text-primary flex items-center gap-3 text-gray-600 dark:text-gray-400">
                                <i class="fa-regular fa-credit-card"></i>
                                <span>My Payment Options</span>
                            </a>
                        </li>
                        <li class="group">
                            <a href="./address-book.html"
                                class="group-hover:text-primary flex items-center gap-3 text-gray-600 dark:text-gray-400">
                                <i class="fa-solid fa-location-dot"></i>
                                <span>Address Book</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </aside>
            <!-- account Content -->
            <div class="mb-6 shadow-md rounded-md lg:col-span-3">
                <h2 class="font-semibold text-lg text-primary mb-6">
                    Edit Your Profile
                </h2>
                <form action="">
                    <div class="row mb-6 grid sm:grid-cols-2 gap-8">
                        <div class="left">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" placeholder="Md"
                                class="w-full mt-4 p-3 rounded-md bg-gray-100" />
                        </div>
                        <div class="right">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" placeholder="Rimel"
                                class="w-full mt-4 p-3 rounded-md bg-gray-100" />
                        </div>
                    </div>
                    <div class="row mb-6 grid sm:grid-cols-2 gap-8">
                        <div class="left">
                            <label for="email">Email Name</label>
                            <input type="text" id="email" placeholder="Wagdy@gmail.com"
                                class="w-full mt-4 p-3 rounded-md bg-gray-100" />
                        </div>
                        <div class="right">
                            <label for="address">Address</label>
                            <input type="text" id="address" placeholder="1234 Mansoura , Egypt"
                                class="w-full mt-4 p-3 rounded-md bg-gray-100" />
                        </div>
                    </div>
                    <div class="row mb-6">
                        <label for="password">Password Changes</label>
                        <input type="password" id="password" placeholder="Current Password"
                            class="w-full mt-4 p-3 rounded-md bg-gray-100" />
                        <input type="password" placeholder="New Password"
                            class="w-full mt-4 p-3 rounded-md bg-gray-100" />
                        <input type="password" placeholder="Confirm New Password"
                            class="w-full mt-4 p-3 rounded-md bg-gray-100" />
                    </div>
                    <div class="row flex gap-3 justify-end">
                        <button
                            class="shadow-md text-gray-700 px-8 py-3 rounded-sm hover:bg-primary transition-colors duration-300 font-medium ml-4">
                            Cancel
                        </button>
                        <button type="submit"
                            class="bg-primary text-white px-10 py-3 rounded-sm hover:bg-red-600 transition-colors duration-300 font-medium">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>
    <!-- end userAccount -->


    <!-- JS -->
    <script src="./assets/js/index.js"></script>
</body>

</html>
